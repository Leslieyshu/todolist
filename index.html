<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TodoList</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #18212f;
      --muted: #6b7686;
      --line: #dce3ea;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 20px 55px rgba(24, 33, 47, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(22, 163, 74, 0.08), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(940px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 620px;
      overflow: hidden;
      border: 1px solid rgba(220, 227, 234, 0.9);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 32px;
      border-right: 1px solid var(--line);
      background: #f9fafb;
    }

    .brand {
      display: grid;
      gap: 8px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .stats {
      display: grid;
      gap: 12px;
    }

    .stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .stat span {
      position: relative;
      padding-left: 12px;
      color: #334155;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .stat span::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 4px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--primary), #60a5fa);
      transform: translateY(-50%);
    }

    .stat strong {
      color: var(--text);
      font-size: 22px;
    }

    .filters {
      display: grid;
      gap: 8px;
      margin-top: auto;
    }

    .filter {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 12px 14px;
      background: transparent;
      color: var(--muted);
      text-align: left;
      transition: 0.2s ease;
    }

    .filter:hover,
    .filter.active {
      border-color: #bfd1ff;
      background: #eef4ff;
      color: var(--primary);
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 32px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }

    .task-input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .task-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .add-btn,
    .clear-btn {
      height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .add-btn:hover {
      background: var(--primary-dark);
    }

    .add-btn:active,
    .clear-btn:active {
      transform: translateY(1px);
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .clear-btn {
      height: 36px;
      padding: 0 12px;
      background: #eef2f7;
      color: var(--muted);
      font-weight: 600;
    }

    .clear-btn:hover {
      background: #e4eaf1;
      color: var(--danger);
    }

    .todos {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .todo {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
    }

    .check {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      min-width: 26px;
      border: 2px solid #c7d1dc;
      border-radius: 999px;
      padding: 0;
      background: #fff;
      color: #fff;
      flex: 0 0 auto;
      line-height: 1;
    }

    .todo.done .check {
      border-color: var(--success);
      background: var(--success);
    }

    .todo-title {
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      outline: none;
      line-height: 1.5;
    }

    .todo.done .todo-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .delete {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
    }

    .delete:hover {
      background: #fee2e2;
      color: var(--danger);
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 260px;
      border: 1px dashed #c9d3df;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 560px);
        padding: 20px 0;
      }

      .shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .sidebar {
        gap: 18px;
        padding: 24px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .stat {
        display: grid;
        justify-items: start;
        gap: 6px;
        padding: 10px 0;
      }

      .filters {
        grid-template-columns: repeat(3, 1fr);
        margin-top: 0;
      }

      .filter {
        text-align: center;
      }

      .main {
        padding: 24px;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .add-btn {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="TodoList 应用">
      <aside class="sidebar">
        <div class="brand">
          <h1>TodoList</h1>
          <p>今天也要乖乖打勾，把小任务都收进袋子里。</p>
        </div>

        <div class="stats" aria-label="任务统计">
          <div class="stat">
            <span>全部</span>
            <strong id="totalCount">0</strong>
          </div>
          <div class="stat">
            <span>待办</span>
            <strong id="activeCount">0</strong>
          </div>
          <div class="stat">
            <span>完成</span>
            <strong id="doneCount">0</strong>
          </div>
        </div>

        <nav class="filters" aria-label="任务筛选">
          <button class="filter active" type="button" data-filter="all">全部任务</button>
          <button class="filter" type="button" data-filter="active">只看待办</button>
          <button class="filter" type="button" data-filter="done">已完成</button>
        </nav>
      </aside>

      <section class="main">
        <form class="topbar" id="todoForm">
          <input
            class="task-input"
            id="taskInput"
            type="text"
            maxlength="80"
            placeholder="输入新任务，例如：整理会议纪要"
            autocomplete="off"
            aria-label="输入新任务"
          />
          <button class="add-btn" type="submit">添加任务</button>
        </form>

        <div class="list-head">
          <span id="viewLabel">全部任务</span>
          <button class="clear-btn" id="clearDone" type="button">清除已完成</button>
        </div>

        <ul class="todos" id="todoList"></ul>
        <div class="empty" id="emptyState" hidden>
          <span>还没有任务。<br />从上方添加第一件要完成的事吧。</span>
        </div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "simple-todolist-items";

    const form = document.querySelector("#todoForm");
    const input = document.querySelector("#taskInput");
    const list = document.querySelector("#todoList");
    const emptyState = document.querySelector("#emptyState");
    const totalCount = document.querySelector("#totalCount");
    const activeCount = document.querySelector("#activeCount");
    const doneCount = document.querySelector("#doneCount");
    const clearDone = document.querySelector("#clearDone");
    const filterButtons = document.querySelectorAll(".filter");
    const viewLabel = document.querySelector("#viewLabel");

    let currentFilter = "all";
    let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    if (todos.length === 0) {
      todos = [
        { id: crypto.randomUUID(), title: "规划今天最重要的 3 件事", done: false },
        { id: crypto.randomUUID(), title: "完成 TodoList 页面", done: true }
      ];
    }

    function saveTodos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function visibleTodos() {
      if (currentFilter === "active") return todos.filter((todo) => !todo.done);
      if (currentFilter === "done") return todos.filter((todo) => todo.done);
      return todos;
    }

    function updateStats() {
      const done = todos.filter((todo) => todo.done).length;
      totalCount.textContent = todos.length;
      activeCount.textContent = todos.length - done;
      doneCount.textContent = done;
      clearDone.disabled = done === 0;
      clearDone.style.opacity = done === 0 ? "0.55" : "1";
    }

    function renderTodos() {
      const items = visibleTodos();
      list.innerHTML = "";
      emptyState.hidden = items.length > 0;

      items.forEach((todo) => {
        const item = document.createElement("li");
        item.className = `todo${todo.done ? " done" : ""}`;

        const toggle = document.createElement("button");
        toggle.className = "check";
        toggle.type = "button";
        toggle.setAttribute("aria-label", todo.done ? "标记为待办" : "标记为完成");
        toggle.textContent = todo.done ? "✓" : "";
        toggle.addEventListener("click", () => {
          todo.done = !todo.done;
          saveTodos();
          renderTodos();
        });

        const title = document.createElement("input");
        title.className = "todo-title";
        title.value = todo.title;
        title.setAttribute("aria-label", "编辑任务");
        title.addEventListener("change", () => {
          const nextTitle = title.value.trim();
          if (!nextTitle) {
            todos = todos.filter((itemTodo) => itemTodo.id !== todo.id);
          } else {
            todo.title = nextTitle;
          }
          saveTodos();
          renderTodos();
        });

        const remove = document.createElement("button");
        remove.className = "delete";
        remove.type = "button";
        remove.setAttribute("aria-label", "删除任务");
        remove.textContent = "×";
        remove.addEventListener("click", () => {
          todos = todos.filter((itemTodo) => itemTodo.id !== todo.id);
          saveTodos();
          renderTodos();
        });

        item.append(toggle, title, remove);
        list.appendChild(item);
      });

      updateStats();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const title = input.value.trim();
      if (!title) return;

      todos.unshift({
        id: crypto.randomUUID(),
        title,
        done: false
      });
      input.value = "";
      currentFilter = "all";
      filterButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === currentFilter);
      });
      viewLabel.textContent = "全部任务";
      saveTodos();
      renderTodos();
    });

    clearDone.addEventListener("click", () => {
      todos = todos.filter((todo) => !todo.done);
      saveTodos();
      renderTodos();
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle("active", item === button));
        viewLabel.textContent = button.textContent;
        renderTodos();
      });
    });

    renderTodos();
  </script>
</body>
</html>
